{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-slate-900 p-8 rounded-xl shadow-lg border border-slate-700">
    <h2 class="text-2xl font-bold text-white mb-6">Add New Product</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-slate-400 mb-2">Name</label>
            <input type="text" name="name" required class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 text-white">
        </div>
        <div class="mb-4">
            <label class="block text-slate-400 mb-2">Slug</label>
            <input type="text" name="slug" required class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 text-white">
        </div>
        <div class="mb-4">
            <label class="block text-slate-400 mb-2">Price</label>
            <input type="number" step="0.01" name="price" required class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 text-white">
        </div>
        <div class="mb-4">
            <label class="block text-slate-400 mb-2">Category</label>
            <select name="category" required class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 text-white">
                {% for category in categories %}
                    <option value="{{ category.id }}">{{ category.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-4">
            <label class="block text-slate-400 mb-2">Image</label>
            <input type="file" name="image" required class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 text-white">
        </div>
        <div class="mb-4">
            <label class="block text-slate-400 mb-2">Description</label>
            <textarea name="description" class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 text-white"></textarea>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700">Save Product</button>
    </form>
</div>
{% endblock %}
