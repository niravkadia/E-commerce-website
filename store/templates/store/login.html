{% extends 'base.html' %}
{% block content %}
<div class="max-w-md mx-auto bg-slate-900 p-8 rounded-2xl border border-slate-800 shadow-xl">
    <h2 class="text-3xl font-bold text-white mb-6 text-center">Login</h2>
    <form method="post">
        {% csrf_token %}
        <div class="mb-4">
            <label class="block text-slate-400 mb-2">Username</label>
            <input type="text" name="username" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white" required>
        </div>
        <div class="mb-6">
            <label class="block text-slate-400 mb-2">Password</label>
            <input type="password" name="password" class="w-full bg-slate-800 border border-slate-700 rounded-xl p-3 text-white" required>
        </div>
        <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-500 transition">Verify</button>
    </form>
</div>
{% endblock %}
