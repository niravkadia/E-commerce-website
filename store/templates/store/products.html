{% extends 'base.html' %}
{% block content %}
<section>
    <h2 class="text-4xl font-bold text-white mb-8">Our Premium Products</h2>
    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-8">
        {% for product in products %}
        <div class="bg-slate-900 rounded-2xl p-6 shadow-sm border border-slate-800 hover:shadow-xl hover:border-slate-700 transition-all duration-300">
            <div class="h-48 bg-slate-800 rounded-lg mb-6 flex items-center justify-center">
                <span class="text-slate-600">Image</span>
            </div>
            <h3 class="text-lg font-bold text-white mb-1">{{ product.name }}</h3>
            <p class="text-slate-400 font-medium mb-4">${{ product.price }}</p>
            <button class="w-full bg-blue-600 text-white font-semibold py-3 rounded-xl hover:bg-blue-500 transition-colors">Add to Cart</button>
        </div>
        {% endfor %}
    </div>
</section>
{% endblock %}
