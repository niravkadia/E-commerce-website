<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Store</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100">
    <nav class="bg-slate-900 border-b border-slate-800 p-6 flex justify-between items-center shadow-md">
        <h1 class="text-3xl font-extrabold text-blue-500 tracking-tight">OpenClaw E-Store</h1>
        <div class="flex items-center space-x-6">
            {% if request.path != '/' %}
                <a href="/" class="text-slate-300 hover:text-white font-medium">Home</a>
            {% endif %}
            {% if user.is_authenticated %}
                <a href="#" class="text-slate-300 hover:text-white font-medium">Cart</a>
                <a href="{% url 'logout' %}" class="bg-red-600 px-4 py-2 rounded-lg text-white font-medium hover:bg-red-700 transition">Logout</a>
            {% else %}
                <a href="{% url 'login' %}" class="bg-blue-600 px-4 py-2 rounded-lg text-white font-medium hover:bg-blue-700 transition">Login</a>
                <a href="{% url 'register' %}" class="bg-blue-600 px-4 py-2 rounded-lg text-white font-medium hover:bg-blue-700 transition">Register</a>
            {% endif %}
        </div>
    </nav>
    <div class="container mx-auto p-8">
        {% if messages %}
            {% for message in messages %}
                <div class="message-banner p-4 mb-4 text-sm rounded-lg {% if message.tags == 'error' %}bg-red-900/50 text-red-200{% else %}bg-green-900/50 text-green-200{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>
    <script>
        setTimeout(function() {
            const messages = document.querySelectorAll('.message-banner');
            messages.forEach(msg => msg.style.display = 'none');
        }, 5000);
    </script>
</body>
</html>
